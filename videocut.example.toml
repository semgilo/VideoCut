[pipeline]
export_platform_materials = true
cleanup_source_after_publish = true  # use --no-cleanup-source to keep source/
output_name = "final_cn.mp4"
runs_dir = "runs"

[translation]
llm_base_url = "http://127.0.0.1:8888/v1"
llm_api_key = "replace_with_your_local_api_key"
llm_model = "translategemma-4b-it-mlx-4bit"
llm_timeout = 120
batch_size = 10
concurrency = 4
target_cps = 4.5
char_tolerance = 0.2  # L/V char budget tolerance, default ±20%
protected_terms_path = "translation_protected_terms.txt"

[cosyvoice]
python = "./.venv-cosyvoice/bin/python"
repo_dir = ".vendor/CosyVoice"
model_dir = ".vendor/CosyVoice/pretrained_models/Fun-CosyVoice3-0.5B"
mode = "cross_lingual"  # or "zero_shot" (requires reference_text)
group_size = 3
concurrency = 2
reference_audio_path = ""
reference_text = ""

[audio]
original_volume = 0.0
dub_volume = 1.0

[subtitles]
burn = true
font = "Arial Unicode MS"
font_path = ""
font_size = 18
overlay_concurrency = 4

[video]
preset = "medium"
crf = 20

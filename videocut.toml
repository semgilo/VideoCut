[pipeline]
cleanup_source_after_publish = true
output_name = "final_subtitled.mp4"  # 渲染中间文件，压缩后最终产物为 final_compressed.mp4
compress_to_max_mb = 500

[translation]
llm_base_url = "http://127.0.0.1:8888/v1"
llm_api_key = "2530"
llm_model = "Qwen3.5-4B-MLX-4bit"
llm_timeout = 120
batch_size = 10
concurrency = 4
target_cps = 4.5
char_tolerance = 0.2
protected_terms_path = "translation_protected_terms.txt"

[audio]
original_volume = 0.0
dub_volume = 1.0

[subtitles]
burn = true
font = "Arial Unicode MS"
font_path = ""
font_size = 18
overlay_concurrency = 4

[video]
preset = "veryfast"
crf = 21
